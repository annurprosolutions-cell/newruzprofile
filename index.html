<!DOCTYPE html>
<html lang="ms" data-theme="light">
<head>
    <meta charset="UTF-8">

    <!-- Google Fonts: Poppins -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">

    <style>
        :root {
            /* Light Theme - Classic Neumorphism */
            --bg-color: #e0e5ec;
            --text-main: #2d3748;
            --text-muted: #718096;
            --primary: #3b82f6;
            --primary-hover: #2563eb;
            --icon-color: #4a5568;
            
            --shadow-dark: #a3b1c6;
            --shadow-light: #ffffff;
            --dot-color: #3b82f6;
            --card-border: transparent;
        }

        [data-theme="dark"] {
            /* Dark Theme */
            --bg-color: #2d3238; 
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --primary: #60a5fa;
            --primary-hover: #93c5fd;
            --icon-color: #cbd5e1;
            
            --shadow-dark: #1a1d21;
            --shadow-light: #404750;
            --dot-color: #60a5fa;
            --card-border: rgba(255, 255, 255, 0.05);
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Poppins', sans-serif;
            transition: background-color 0.4s ease, color 0.4s ease;
            overflow: hidden; 
            -webkit-tap-highlight-color: transparent;
        }

        .arc-border {
            stroke: var(--card-border);
            transition: stroke 0.4s ease;
        }

        .arc-main {
            stroke: var(--bg-color);
            transition: stroke 0.4s ease, filter 0.3s ease;
            filter: drop-shadow(6px 6px 10px var(--shadow-dark)) drop-shadow(-6px -6px 10px var(--shadow-light));
        }

        .menu-item {
            cursor: pointer;
            outline: none;
        }

        .btn-scale-wrap {
            transform-origin: 0 0;
            transition: transform 0.25s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .menu-item:hover .btn-scale-wrap {
            transform: scale(1.02);
        }

        .menu-item:active .btn-scale-wrap {
            transform: scale(0.96);
            filter: drop-shadow(2px 2px 5px var(--shadow-dark)) drop-shadow(-2px -2px 5px var(--shadow-light));
        }

        .svg-text {
            fill: var(--icon-color);
            transition: fill 0.3s ease;
        }
        
        .menu-item:hover + g .svg-text,
        .svg-text.hover-active {
            fill: var(--primary);
        }

        .html-overlay-icon i {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            color: var(--icon-color);
        }

        .html-overlay-icon.hover-active i {
            color: var(--primary);
            transform: scale(1.15);
        }

        .center-circle {
            background-color: var(--bg-color);
            box-shadow: 8px 8px 16px var(--shadow-dark), -8px -8px 16px var(--shadow-light);
            transition: all 0.4s ease;
        }
        
        .center-circle-inset {
            background-color: var(--bg-color);
            box-shadow: inset 5px 5px 10px var(--shadow-dark), inset -5px -5px 10px var(--shadow-light);
        }

        .view-layer {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            transition: all 0.7s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .view-active {
            opacity: 1;
            transform: translateY(0) scale(1);
            pointer-events: auto;
        }

        .view-hidden-down {
            opacity: 0;
            transform: translateY(150px) scale(0.85);
            pointer-events: none;
        }
        
        .view-hidden-up {
            opacity: 0;
            transform: translateY(-150px) scale(0.85);
            pointer-events: none;
        }

        .modal-overlay {
            position: fixed;
            inset: 0;
            background-color: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(5px);
            z-index: 100;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
        }
        
        .modal-overlay.show {
            opacity: 1;
            pointer-events: auto;
        }

        .modal-card {
            background-color: var(--bg-color);
            border: 1px solid var(--card-border);
            box-shadow: 10px 10px 20px var(--shadow-dark), -10px -10px 20px var(--shadow-light);
            border-radius: 24px;
            width: 90%;
            max-width: 400px;
            padding: 28px;
            transform: scale(0.9);
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            max-height: 90vh;
            overflow-y: auto;
            scrollbar-width: none; /* Hide scrollbar for cleaner look */
        }

        .modal-overlay.show .modal-card {
            transform: scale(1);
        }

        .btn-modal {
            background-color: var(--bg-color);
            box-shadow: 4px 4px 8px var(--shadow-dark), -4px -4px 8px var(--shadow-light);
            transition: all 0.2s ease;
            color: var(--text-main);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            font-weight: 600;
        }
        .btn-modal:active {
            box-shadow: inset 4px 4px 8px var(--shadow-dark), inset -4px -4px 8px var(--shadow-light);
            transform: scale(0.96);
        }
        .btn-modal.primary {
            color: var(--primary);
        }

        .neu-input {
            background-color: var(--bg-color);
            box-shadow: inset 4px 4px 8px var(--shadow-dark), inset -4px -4px 8px var(--shadow-light);
            border: 1px solid transparent;
            color: var(--text-main);
            width: 100%;
            padding: 12px 16px;
            border-radius: 12px;
            outline: none;
            transition: all 0.2s ease;
            font-size: 14px;
        }
        .neu-input:focus {
            border-color: var(--primary);
        }

        .calendar-day {
            aspect-ratio: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.2s;
            color: var(--text-main);
            font-weight: 500;
        }
        .calendar-day:hover:not(.empty) {
            background-color: var(--primary);
            color: white;
            box-shadow: 2px 2px 5px var(--shadow-dark);
        }
        .calendar-day.selected {
            background-color: var(--primary);
            color: white;
            box-shadow: inset 2px 2px 5px rgba(0,0,0,0.2);
        }
        .calendar-day.empty {
            cursor: default;
        }

        .slot-btn {
            background-color: var(--bg-color);
            box-shadow: 3px 3px 6px var(--shadow-dark), -3px -3px 6px var(--shadow-light);
            border-radius: 8px;
            padding: 10px;
            font-size: 11px;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s;
            color: var(--text-main);
            font-weight: 600;
        }
        .slot-btn:active {
            box-shadow: inset 3px 3px 6px var(--shadow-dark), inset -3px -3px 6px var(--shadow-light);
        }

        /* Timeline Animation */
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>

            if(activeSubMenu) {
                activeSubMenu.classList.remove('view-active');
                activeSubMenu.classList.add('view-hidden-down');
            }
            setTimeout(() => {
                mainMenu.classList.remove('view-hidden-down', 'view-hidden-up');
                mainMenu.classList.add('view-active');
            }, 100);
        }

        function openPopup(id) {
            const data = popupData[id];
            if(!data) return;

            document.getElementById('popupTitle').innerText = data.title;
            document.getElementById('popupIcon').className = `ph ${data.icon} text-2xl text-[var(--primary)]`;
            document.getElementById('popupDesc').innerHTML = data.desc; 
            
            const btn1 = document.getElementById('popupBtn1');
            if (data.btn1Text) {
                btn1.style.display = 'flex';
                document.getElementById('popupBtn1Text').innerText = data.btn1Text;
                document.getElementById('popupBtn1Icon').className = `ph ${data.btn1Icon || 'ph-image'} text-xl text-[var(--icon-color)]`;
                btn1.onclick = () => openMediaModal(data.btn1Link, data.btn1Type);
            } else { btn1.style.display = 'none'; }
            
            const btn2 = document.getElementById('popupBtn2');
            if (data.btn2Text) {
                btn2.style.display = 'flex';
                document.getElementById('popupBtn2Text').innerText = data.btn2Text;
                document.getElementById('popupBtn2Icon').className = `ph ${data.btn2Icon || 'ph-shopping-cart'} text-xl text-[var(--primary)]`;
                btn2.onclick = () => openMediaModal(data.btn2Link, data.btn2Type);
            } else { btn2.style.display = 'none'; }

            document.getElementById('itemModal').classList.add('show');
        }

        function closePopup() { document.getElementById('itemModal').classList.remove('show'); }

        function openMediaModal(url, type) {
            if(!url || url === '#') return;
            const container = document.getElementById('mediaContainer');
            const loading = document.getElementById('mediaLoading');
            container.innerHTML = ''; 
            
            if(type === 'image') {
                loading.style.display = 'none';
                container.innerHTML = `<img src="${url}" class="w-full h-full object-contain rounded-xl" alt="Silibus" />`;
            } else if (type === 'iframe') {
                loading.style.display = 'flex';
                container.innerHTML = `<iframe src="${url}" class="w-full h-full border-0 rounded-xl bg-white" onload="document.getElementById('mediaLoading').style.display='none'"></iframe>`;
            }
            document.getElementById('mediaModal').classList.add('show');
        }

        function closeMediaModal() {
            document.getElementById('mediaModal').classList.remove('show');
            setTimeout(() => { document.getElementById('mediaContainer').innerHTML = ''; }, 300);
        }

        function openBooking(type) {
            currentCoachingType = type;
            const details = coachingDetails[type];
            document.getElementById('bookingTitle').innerText = details.title;
            document.getElementById('bookingPrice').innerText = details.price;
            
            selectedDate = null; selectedTime = '';
            document.getElementById('timeSlotContainer').classList.add('hidden');
            document.getElementById('step1Calendar').style.display = 'flex';
            document.getElementById('step2Form').style.display = 'none';
            
            renderCalendar();
            document.getElementById('bookingModal').classList.add('show');
        }

        function closeBooking() { document.getElementById('bookingModal').classList.remove('show'); }

        function changeMonth(dir) {
            currentDate.setMonth(currentDate.getMonth() + dir);
            renderCalendar();
            document.getElementById('timeSlotContainer').classList.add('hidden');
        }

        function renderCalendar() {
            const year = currentDate.getFullYear();
            const month = currentDate.getMonth();
            const monthNames = ["Januari", "Februari", "Mac", "April", "Mei", "Jun", "Julai", "Ogos", "September", "Oktober", "November", "Disember"];
            document.getElementById('monthYearDisplay').innerText = `${monthNames[month]} ${year}`;
            
            const firstDay = new Date(year, month, 1).getDay();
            const daysInMonth = new Date(year, month + 1, 0).getDate();
            const calendarDays = document.getElementById('calendarDays');
            calendarDays.innerHTML = '';
            
            for (let i = 0; i < firstDay; i++) { calendarDays.innerHTML += `<div class="calendar-day empty"></div>`; }
            
            const today = new Date();
            today.setHours(0,0,0,0); // reset masa untuk perbandingan tepat
            
            for (let i = 1; i <= daysInMonth; i++) {
                const iterDate = new Date(year, month, i);
                if(iterDate < today) {
                    calendarDays.innerHTML += `<div class="calendar-day empty opacity-30">${i}</div>`;
                } else {
                    calendarDays.innerHTML += `<div class="calendar-day" onclick="selectDate(${year}, ${month}, ${i}, this)">${i}</div>`;
                }
            }
        }

        function selectDate(year, month, day, element) {
            document.querySelectorAll('.calendar-day').forEach(el => el.classList.remove('selected'));
            element.classList.add('selected');
            selectedDate = new Date(year, month, day);
            renderTimeSlots(selectedDate.getDay());
        }

        function renderTimeSlots(dayOfWeek) {
            const container = document.getElementById('timeSlotContainer');
            const grid = document.getElementById('timeSlotsGrid');
            grid.innerHTML = ''; container.classList.remove('hidden');
            let slots = [];
            
            if (dayOfWeek === 0) { // Ahad
                slots = ['08:00 AM - 10:00 AM', '11:00 AM - 01:00 PM', '02:00 PM - 04:00 PM', '05:00 PM - 07:00 PM', '09:00 PM - 11:00 PM'];
            } else if (dayOfWeek === 6) { // Sabtu
                slots = ['05:00 PM - 07:00 PM', '09:00 PM - 11:00 PM'];
            } else { // Isnin - Jumaat
                slots = ['09:00 PM - 11:00 PM'];
            }

            slots.forEach(time => {
                grid.innerHTML += `<div class="slot-btn" onclick="proceedToForm('${time}')">${time}</div>`;
            });
            // Auto scroll ke slot
            setTimeout(() => { container.scrollIntoView({behavior: 'smooth', block: 'nearest'}); }, 100);
        }

        function proceedToForm(time) {
            selectedTime = time;
            const options = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
            const dateStr = selectedDate.toLocaleDateString('ms-MY', options);
            document.getElementById('selectedDateTimeDisplay').innerHTML = `${dateStr} <br/> <span class="text-[var(--text-main)] text-xs font-semibold mt-1 block">${selectedTime}</span>`;
            
            const dynamicFields = document.getElementById('dynamicFormFields');
            dynamicFields.innerHTML = ''; 
            
            if (currentCoachingType === '1to1' || currentCoachingType === '3to1') {
                let html = `
                    <select id="c_focus" required class="neu-input">
                        <option value="" disabled selected>Pilih Fokus Pembelajaran</option>
                        <option value="Canva Ai">Canva Ai</option>
                        <option value="Gemini Ai">Gemini Ai</option>
                        <option value="Looker Studio">Looker Studio</option>
                        <option value="Website">Website</option>
                    </select>`;
                if (currentCoachingType === '3to1') {
                    html += `<textarea id="c_participants" required rows="2" placeholder="Senarai Nama Peserta (3 Orang)..." class="neu-input resize-none"></textarea>`;
                }
                dynamicFields.innerHTML = html;
            } else if (currentCoachingType === 'custom') {
                dynamicFields.innerHTML = `
                    <select id="c_goal" required class="neu-input">
                        <option value="" disabled selected>Tujuan Coaching</option>
                        <option value="Bina Sistem">Bina Sistem / Syarikat</option>
                        <option value="Kelas Ramai">Kelas Berkumpulan (Ramai)</option>
                    </select>
                    <input type="number" id="c_budget" required placeholder="Anggaran Bajet (RM)" class="neu-input">
                    <select id="c_mode" required class="neu-input">
                        <option value="" disabled selected>Mod Kelas</option>
                        <option value="Online">Online (Google Meet/Zoom)</option>
                        <option value="Fizikal">Bersemuka (Fizikal)</option>
                    </select>`;
            }

            document.getElementById('step1Calendar').style.display = 'none';
            document.getElementById('step2Form').style.display = 'flex';
        }

        function backToCalendar() {
            document.getElementById('step1Calendar').style.display = 'flex';
            document.getElementById('step2Form').style.display = 'none';
        }

        function submitCoaching(e) {
            e.preventDefault();
            const name = document.getElementById('c_name').value;
            const phone = document.getElementById('c_phone').value;
            const remark = document.getElementById('c_remark').value || "Tiada catatan tambahan.";
            const dateStr = selectedDate.toLocaleDateString('ms-MY');
            
            let message = `*TEMPAHAN COACHING BARU*%0A%0A`;
            message += `*Pakej:* ${coachingDetails[currentCoachingType].title}%0A`;
            message += `*Tarikh:* ${dateStr}%0A`;
            message += `*Masa:* ${selectedTime}%0A`;
            message += `*Nama:* ${name}%0A`;
            message += `*No Tel:* ${phone}%0A%0A`;
            
            if (currentCoachingType === '1to1') {
                message += `*Fokus:* ${document.getElementById('c_focus').value}%0A`;
            } else if (currentCoachingType === '3to1') {
                message += `*Fokus:* ${document.getElementById('c_focus').value}%0A`;
                message += `*Senarai Peserta:* %0A${document.getElementById('c_participants').value}%0A`;
            } else if (currentCoachingType === 'custom') {
                message += `*Tujuan:* ${document.getElementById('c_goal').value}%0A`;
                message += `*Bajet:* RM ${document.getElementById('c_budget').value}%0A`;
                message += `*Mod Kelas:* ${document.getElementById('c_mode').value}%0A`;
            }

            message += `%0A*Cabaran/Nota:* %0A${remark}`;

            // === TUKAR NOMBOR TELEFON ANDA DI SINI ===
            const whatsappNumber = "60111111111"; // <<-- Ganti dengan nombor anda
            window.open(`https://wa.me/${whatsappNumber}?text=${message}`, '_blank');
            closeBooking();
        }

        document.getElementById('itemModal').addEventListener('click', function(e) { if (e.target === this) closePopup(); });
        document.getElementById('mediaModal').addEventListener('click', function(e) { if (e.target === this) closeMediaModal(); });
        document.getElementById('bookingModal').addEventListener('click', function(e) { if (e.target === this) closeBooking(); });

        const themeToggleBtn = document.getElementById('themeToggle');
        const themeIcon = document.getElementById('themeIcon');
        const currentTheme = localStorage.getItem('theme') || (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
        
        document.documentElement.setAttribute('data-theme', currentTheme);
        updateThemeIcon(currentTheme);

        themeToggleBtn.addEventListener('click', () => {
            let theme = document.documentElement.getAttribute('data-theme');
            let switchTo = theme === 'dark' ? 'light' : 'dark';
            document.documentElement.setAttribute('data-theme', switchTo);
            localStorage.setItem('theme', switchTo);
            updateThemeIcon(switchTo);
        });

        function updateThemeIcon(theme) {
            if(theme === 'dark') { themeIcon.classList.replace('ph-moon', 'ph-sun'); } 
            else { themeIcon.classList.replace('ph-sun', 'ph-moon'); }
        }
    </script>
</body>
</html>
