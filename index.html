<!DOCTYPE html>
<html lang="ms" data-theme="light">

    <!-- Google Fonts: Poppins -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">

    <style>
        :root {
            /* Light Theme */
            --bg-color: #f0f4f8; 
            --text-main: #1e293b;
            --text-muted: #64748b;
            --primary: #2563eb;
            --primary-hover: #1d4ed8;
            --icon-color: #1e3a8a;
            
            --shadow-dark: rgba(163, 177, 198, 0.5);
            --shadow-light: rgba(255, 255, 255, 1);
            --dot-color: #60a5fa;
            --card-border: transparent;
        }

        [data-theme="dark"] {
            /* Dark Theme */
            --bg-color: #1a202c; 
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --primary: #3b82f6;
            --primary-hover: #60a5fa;
            --icon-color: #60a5fa;
            
            --shadow-dark: rgba(15, 20, 25, 0.9);
            --shadow-light: rgba(45, 55, 72, 0.6);
            --dot-color: #3b82f6;
            --card-border: rgba(255, 255, 255, 0.08);
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Poppins', sans-serif;
            transition: background-color 0.4s ease, color 0.4s ease;
            overflow: hidden; /* Prevent scrolling during transition */
            -webkit-tap-highlight-color: transparent;
        }

        /* Gaya SVG Buttons */
        .arc-border {
            stroke: var(--card-border);
            transition: stroke 0.4s ease;
        }

        .arc-main {
            stroke: var(--bg-color);
            transition: stroke 0.4s ease, filter 0.3s ease;
            filter: drop-shadow(6px 6px 10px var(--shadow-dark)) drop-shadow(-6px -6px 10px var(--shadow-light));
        }

        .menu-item {
            cursor: pointer;
            outline: none;
        }

        .btn-scale-wrap {
            transform-origin: 0 0;
            transition: transform 0.25s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .menu-item:hover .btn-scale-wrap {
            transform: scale(1.02);
        }

        .menu-item:active .btn-scale-wrap {
            transform: scale(0.96);
            filter: drop-shadow(2px 2px 5px var(--shadow-dark)) drop-shadow(-2px -2px 5px var(--shadow-light));
        }

        /* Gaya Teks SVG Melengkung */
        .svg-text {
            fill: var(--icon-color);
            transition: fill 0.3s ease;
        }
        
        .menu-item:hover + g .svg-text, /* Optional hover tie */
        .svg-text.hover-active {
            fill: var(--primary);
        }

        /* Gaya Ikon HTML di atas */
        .html-overlay-icon i {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            color: var(--icon-color);
        }

        .html-overlay-icon.hover-active i {
            color: var(--primary);
            transform: scale(1.15);
        }

        /* Center Bulatan */
        .center-circle {
            background-color: var(--bg-color);
            box-shadow: 8px 8px 16px var(--shadow-dark), -8px -8px 16px var(--shadow-light);
            transition: all 0.4s ease;
        }
        
        .center-circle-inset {
            background-color: var(--bg-color);
            box-shadow: inset 5px 5px 10px var(--shadow-dark), inset -5px -5px 10px var(--shadow-light);
        }

        /* View Transitions (Main vs Sub Menu) */
        .view-layer {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            transition: all 0.7s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .view-active {
            opacity: 1;
            transform: translateY(0) scale(1);
            pointer-events: auto;
        }

        .view-hidden-down {
            opacity: 0;
            transform: translateY(150px) scale(0.85);
            pointer-events: none;
        }
        
        .view-hidden-up {
            opacity: 0;
            transform: translateY(-150px) scale(0.85);
            pointer-events: none;
        }

    </style>
</head>

        <!-- LAYER 5: SUB MENU - EXPERIENCE (3 Cabang)  -->
        <!-- ========================================== -->
        <div id="submenu-experience" class="view-layer view-hidden-down z-20">
            <svg viewBox="-200 -200 400 400" class="absolute inset-0 w-full h-full overflow-visible">
                <defs>
                    <path id="tp-top-exp" d="M -106 -106 A 150 150 0 0 1 106 -106" fill="none" />
                    <path id="tp-bottom-exp" d="M -106 106 A 150 150 0 0 0 106 106" fill="none" />
                </defs>
                <g fill="var(--dot-color)" filter="url(#dot-glow)">
                    <circle cx="0" cy="-140" transform="rotate(60)" r="4.5" />
                    <circle cx="0" cy="-140" transform="rotate(180)" r="4.5" />
                    <circle cx="0" cy="-140" transform="rotate(300)" r="4.5" />
                </g>
                <g class="menu-item sub-item" data-target="exp-git" transform="rotate(0)">
                    <g class="btn-scale-wrap"><use href="#arc-shape-3" class="arc-border" stroke-width="68" /><use href="#arc-shape-3" class="arc-main" stroke-width="64" /></g>
                </g>
                <g class="menu-item sub-item" data-target="exp-proj" transform="rotate(120)">
                    <g class="btn-scale-wrap"><use href="#arc-shape-3" class="arc-border" stroke-width="68" /><use href="#arc-shape-3" class="arc-main" stroke-width="64" /></g>
                </g>
                <g class="menu-item sub-item" data-target="exp-test" transform="rotate(240)">
                    <g class="btn-scale-wrap"><use href="#arc-shape-3" class="arc-border" stroke-width="68" /><use href="#arc-shape-3" class="arc-main" stroke-width="64" /></g>
                </g>
                <g class="pointer-events-none uppercase" style="font-family: 'Poppins', sans-serif; font-weight: 700; font-size: 11px; letter-spacing: 1.2px;">
                    <g><text class="svg-text svg-text-sub-exp-git"><textPath href="#tp-top-exp" startOffset="50%" text-anchor="middle">Github</textPath></text></g>
                    <g transform="rotate(-60)"><text class="svg-text svg-text-sub-exp-proj"><textPath href="#tp-bottom-exp" startOffset="50%" text-anchor="middle" dy="4">Project Done</textPath></text></g>
                    <g transform="rotate(60)"><text class="svg-text svg-text-sub-exp-test"><textPath href="#tp-bottom-exp" startOffset="50%" text-anchor="middle" dy="4">Testimonial</textPath></text></g>
                </g>
            </svg>
            <div class="absolute inset-0 pointer-events-none z-10">
                <div id="icon-sub-exp-git" class="html-overlay-icon absolute" style="top: 18.5%; left: 50%; transform: translate(-50%, -50%);">
                    <i class="ph ph-github-logo text-[24px]"></i>
                </div>
                <div id="icon-sub-exp-proj" class="html-overlay-icon absolute" style="top: 65.75%; left: 77.28%; transform: translate(-50%, -50%);">
                    <i class="ph ph-check-circle text-[24px]"></i>
                </div>
                <div id="icon-sub-exp-test" class="html-overlay-icon absolute" style="top: 65.75%; left: 22.72%; transform: translate(-50%, -50%);">
                    <i class="ph ph-star text-[24px]"></i>

            </div>
            <div onclick="goBack()" class="absolute top-1/2 left-1/2 transform -translate-x-1/2 -translate-y-1/2 w-28 h-28 sm:w-36 sm:h-36 rounded-full center-circle flex items-center justify-center z-20 cursor-pointer group active:scale-95 transition-transform">
                <div class="w-[85%] h-[85%] rounded-full center-circle-inset flex flex-col items-center justify-center relative overflow-hidden bg-[var(--bg-color)] group-hover:bg-blue-500/5 transition-colors">
                    <i class="ph ph-arrow-u-up-left text-3xl sm:text-4xl text-[var(--icon-color)] group-hover:text-[var(--primary)] transition-colors mb-1"></i>
                    <span class="text-[9px] sm:text-[10px] font-bold text-[var(--text-muted)] group-hover:text-[var(--primary)] uppercase tracking-wider transition-colors">Kembali</span>
                </div>
            </div>
        </div>
        
    </div>

    <!-- LOGIK JAVASCRIPT -->
    <script>
        // Logik Buka Menu Sub (Self Learning)
        function openSubMenu(menuId) {
            const mainMenu = document.getElementById('main-menu');
            const subMenu = document.getElementById(`submenu-${menuId}`);
            
            if(!subMenu) return;

            // Main menu turun & hilang
            mainMenu.classList.remove('view-active');
            mainMenu.classList.add('view-hidden-down');

            // Sub menu naik & muncul
            subMenu.classList.remove('view-hidden-down', 'view-hidden-up'); // just in case
            // Sedikit delay untuk efek yang lebih semulajadi
            setTimeout(() => {
                subMenu.classList.add('view-active');
            }, 100);
        }

        // Logik Kembali ke Menu Utama
        function goBack() {
            const mainMenu = document.getElementById('main-menu');
            
            // Cari sub menu yang sedang aktif
            const activeSubMenu = document.querySelector('.view-layer:not(#main-menu).view-active');
            
            if(activeSubMenu) {
                // Sub menu turun & hilang
                activeSubMenu.classList.remove('view-active');
                activeSubMenu.classList.add('view-hidden-down');
            }

            // Main menu naik semula
            setTimeout(() => {
                mainMenu.classList.remove('view-hidden-down', 'view-hidden-up');
                mainMenu.classList.add('view-active');
            }, 100);
        }

        // Logik Toggle Tema (Dark/Light Mode)
        const themeToggleBtn = document.getElementById('themeToggle');
        const themeIcon = document.getElementById('themeIcon');
        
        const currentTheme = localStorage.getItem('theme') || (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
        document.documentElement.setAttribute('data-theme', currentTheme);
        updateThemeIcon(currentTheme);

        themeToggleBtn.addEventListener('click', () => {
            let theme = document.documentElement.getAttribute('data-theme');
            let switchTo = theme === 'dark' ? 'light' : 'dark';
            
            document.documentElement.setAttribute('data-theme', switchTo);
            localStorage.setItem('theme', switchTo);
            updateThemeIcon(switchTo);
        });

        function updateThemeIcon(theme) {
            if(theme === 'dark') {
                themeIcon.classList.remove('ph-moon');
                themeIcon.classList.add('ph-sun');
            } else {
                themeIcon.classList.remove('ph-sun');
                themeIcon.classList.add('ph-moon');
            }
        }

        // Logik Hover Highlight
        function attachHover(itemsClass, prefix) {
            document.querySelectorAll(itemsClass).forEach(item => {
                item.addEventListener('mouseenter', () => {
                    const targetId = item.getAttribute('data-target');
                    document.querySelector(`.svg-text-${prefix}-${targetId}`)?.classList.add('hover-active');
                    document.getElementById(`icon-${prefix}-${targetId}`)?.classList.add('hover-active');
                });
                item.addEventListener('mouseleave', () => {
                    const targetId = item.getAttribute('data-target');
                    document.querySelector(`.svg-text-${prefix}-${targetId}`)?.classList.remove('hover-active');
                    document.getElementById(`icon-${prefix}-${targetId}`)?.classList.remove('hover-active');
                });
            });
        }

        attachHover('.main-item', 'main');
        attachHover('.sub-item', 'sub');
    </script>
</body>
